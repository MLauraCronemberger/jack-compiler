services:
 
  # ─────────────────────────────────────────────────────────────────
  # Serviço padrão: valida os 3 arquivos .jack contra os XMLs oficiais
  # Uso: docker compose up validation
  # ─────────────────────────────────────────────────────────────────
  validation:
    build: .
    command: ["java", "-cp", "bin", "br.com.jackcompiler.FilesAndValidationRunner"]
    volumes:
      - ./output:/app/output   # XMLs gerados aparecem na sua pasta local
 
  # ─────────────────────────────────────────────────────────────────
  # Exibe os tokens do LexerTest no console
  # Uso: docker compose run --rm lexer
  # ─────────────────────────────────────────────────────────────────
  lexer:
    build: .
    command: ["java", "-cp", "bin", "br.com.jackcompiler.LexerTest"]
    volumes:
      - ./output:/app/output
 
  # ─────────────────────────────────────────────────────────────────
  # Compila um arquivo .jack qualquer para XML manualmente
  # Uso: docker compose run --rm compiler <arquivo.jack> <output/nome.xml>
  # Exemplo:
  #   docker compose run --rm compiler \
  #     src/test/java/br/com/jackcompiler/Main.jack output/MainT.xml
  # ─────────────────────────────────────────────────────────────────
  compiler:
    build: .
    entrypoint: ["java", "-cp", "bin", "br.com.jackcompiler.Main"]
    volumes:
      - ./output:/app/output